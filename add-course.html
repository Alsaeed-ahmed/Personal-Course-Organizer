<!DOCTYPE html>
<html lang=en dir=ltr>
<head>
    <meta charset=UTF-8>
    <meta name=viewport content=width=device-width,initial-scale=1.0>
    <title>Personal Course Organizer - Add Course</title>
    <link rel=stylesheet href=style.css>
</head>
<body>
    <header>
        <h1>Personal Course Organizer</h1>
        <nav>
            <input type=checkbox id=menu-toggle>
            <label for=menu-toggle class=hamburger>&#9776;</label>
            <ul>
                <li><a href=index.html>Home</a></li>
                <li><a href=my-courses.html>My Courses</a></li>
                <li><a href=add-course.html>Add Course</a></li>
                <li><a href=contact-us.html>Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id=add-course-form>
            <h2>Add a new course</h2>
            <form action=# method=post>
                <label for=course-name>Course name:</label>
                <input type=text id=course-name name=course-name required>

                <label for=instructor>Instructor:</label>
                <input type=text id=instructor name=instructor required>

                <label for=credits>Credits:</label>
                <input type=number id=credits name=credits min=1 required>

                <label for=notes>Notes:</label>
                <textarea id=notes name=notes></textarea>

                <button type=submit>Add Course</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Personal Course Organizer. All rights reserved.</p>
    </footer>
</body>
</html>
